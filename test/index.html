<!DOCTYPE html>
<html>
<head>
<script src="https://cdn.jsdelivr.net/npm/onnxruntime-web/dist/ort.min.js"></script>
<meta charset="utf-8">
<title>TEST</title>
</head>
<body>

<script type="module">
import { AutoProcessor, loadAudioWithMask, zeroMeanUnitVarNorm, SileroVADStream, loadAudio, SmartTurnV3 } from "../js/package.js"

async function test_1() {
    let processor = await AutoProcessor.from_pretrained("../models/whisper-pad-right");
    let [waveform, attMask] = await loadAudioWithMask("5s.wav", 16000, 128000);

    waveform = zeroMeanUnitVarNorm([waveform], [attMask])[0]

    let output = await processor(waveform);
    let {input_features, _} = output;

    console.log("TEST 1", "input_features dims:", input_features.dims);
    console.log("TEST 1", "input_features data:", input_features.data);
}

async function test_2(){
    let vadStream = await SileroVADStream.fromFile("../models/silero-vad.onnx");
    let [waveform, _] = await loadAudioWithMask("5s.wav", 16000, 8192);
    let results = await vadStream(waveform);
    console.log("TEST 2", results);
    console.log("TEST 2", results.map(x => (!!(x > 0.5))));
}

async function test_3(){
    let smartTurn = await SmartTurnV3.fromFile('../models/smart-turn-v3.2-gpu.onnx', '../models/whisper-pad-right');
    let waveform = await loadAudio("5s.wav", 16000);
    console.log("TEST 3", await smartTurn(waveform));

    waveform = await loadAudio("8s.wav");
    console.log("TEST 3", await smartTurn(waveform));
    
    waveform = await loadAudio("24s.wav");
    console.log("TEST 3", await smartTurn(waveform));
}

async function test_4() {
    // Load model
    const smartTurn = await SmartTurnV3.fromFile(
        '../models/ba887ecc-b2a4-4da6-9bd1-8e7fa3f1124e_merged.onnx',
        '../models/whisper-short',
    );
    const sr = 16000;
    const duration = 4;
    const length = sr * duration;

    const waveform = new Float32Array(length);
    for (let i = 0; i < length; i++) {
        waveform[i] = Math.random() * 2 - 1;
    }

    await smartTurn(waveform);

    const N = 10;
    let total = 0;

    for (let i = 0; i < N; i++) {
        const t0 = performance.now();
        await smartTurn(waveform);
        const t1 = performance.now();
        const elapsed = t1 - t0;
        console.log(`Run ${i + 1}: ${elapsed.toFixed(2)} ms`);
        total += elapsed;
    }

    const avg = total / N;
    console.log(`Average time over ${N} runs: ${avg.toFixed(2)} ms`);
}

await test_1();
await test_2();
await test_3();
await test_4();
</script>

</body>
</html>
